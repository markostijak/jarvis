spring:
  profiles:
    active: dev

jarvis:
  runner:
    kubernetes:
      context: 'test'
      base-path: 'k8s'
    docker-compose:
      context: 'test'
  services:
    mysql:
      connection:
        username: 'root'
        password: 'toor'
        url: 'jdbc:mysql://mysql:3306/test'
      deployment:
        paths:
          - 'mysql.yaml'
        env:
          test: 'mysql'
    redis:
      connection:
        host: 'localhost'
        port: 6379
      deployment:
        paths:
          - 'redis.yaml'
        env:
          test: 'redis'

---
spring:
  config:
    activate:
      on-profile: dev

jarvis:
  services:
    mysql:
      connection:
        url: 'jdbc:mysql://localhost:32306/test'
    redis:
      connection:
        host: 'localhost'
        port: 32379
