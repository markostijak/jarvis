spring:
  profiles:
    active: local-dev

jarvis:
  runner:
    kubernetes:
      context: 'test'
      base-path: '${user.dir}/../var/k8s'
    docker-compose:
      context: 'test'
  services:
    mysql:
      connection:
        username: 'root'
        password: 'toor'
        url: 'jdbc:mysql://mysql:3306/test'
      deployment:
        k8s:
          - 'mysql.yaml'
        env:
          name: 'mysql'

    redis:
      connection:
        host: 'redis'
        port: 6379
      deployment:
        k8s:
          - 'redis.yaml'
        env:
          name: 'redis'

    kafka:
      connection:
        bootstrap-servers: 'kafka:9092'
        consumer:
          group-id: 'jarvis'
          auto-offset-reset: 'earliest'
      deployment:
        k8s:
          - 'kafka.yaml'
        env:
          name: 'kafka'

    mongo:
      deployment:
        helm:
          chart: 'bitnami/mongodb'
          repository:
            name: 'bitnami'
            url: 'https://charts.bitnami.com/bitnami'

---
spring:
  config:
    activate:
      on-profile: local-dev

jarvis:
  services:
    mysql:
      connection:
        url: 'jdbc:mysql://localhost:32306/test'
      deployment:
        ports:
          - '32306:3306'
    redis:
      connection:
        host: 'localhost'
        port: 32379
      deployment:
        ports:
          - '32379:6379'
    kafka:
      connection:
        bootstrap-servers: 'localhost.${NAMESPACE}:32092'
        consumer:
          group-id: 'jarvis-dev'
      deployment:
        ports:
          - '32092:9093'
        env:
          KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:32092

---
spring:
  config:
    activate:
      on-profile: parallel-execution

jarvis:
  services:
    mysql:
      connection:
        url: 'jdbc:mysql://mysql.${NAMESPACE}:3306/test'
    redis:
      connection:
        host: 'redis.${NAMESPACE}'
        port: 6379
    kafka:
      connection:
        bootstrap-servers: 'kafka.${NAMESPACE}:9092'
        consumer:
          group-id: 'jarvis-dev'
